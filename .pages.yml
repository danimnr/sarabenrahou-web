media:
  input: public/uploads
  output: /uploads

content:
  - name: config
    label: "⚙ Configuración general"
    type: file
    path: src/data/config.yaml
    fields:
      - { name: titulo_sitio,  label: "Título del sitio",       type: string }
      - { name: descripcion,   label: "Descripción SEO",        type: text }
      - { name: lema,          label: "Lema del hero",          type: string }
      - { name: presentacion,  label: "Presentación del hero",  type: text }
      - { name: imagen_hero,   label: "Foto portada",           type: image }
      - { name: boton_libro,   label: "Texto botón libro",      type: string }
      - { name: boton_biblioteca, label: "Texto botón biblioteca", type: string }
      - { name: email,         label: "Email de contacto",      type: string }
      - { name: texto_intro,   label: "Texto sección contacto", type: text }
      - { name: boton_email,   label: "Texto botón email",      type: string }
      - { name: anuncio_activo, label: "¿Mostrar anuncio?",          type: boolean }
      - { name: anuncio_texto,  label: "Texto del anuncio",          type: text }
      - { name: anuncio_enlace, label: "Enlace del anuncio (URL)",   type: string }

  - name: sara
    label: "✍ Datos de Sara"
    type: file
    path: src/data/sara.yaml
    fields:
      - { name: nombre,         label: "Nombre completo",          type: string, required: true }
      - { name: nombre_corto,   label: "Nombre corto",             type: string }
      - { name: subtitulo,      label: "Subtítulo",                type: string }
      - { name: residencia,     label: "Lugar de residencia",      type: string }
      - { name: bio_corta,      label: "Biografía corta",          type: text,   required: true }
      - { name: bio_completa,   label: "Biografía completa",       type: rich-text }
      - { name: foto,           label: "Fotografía principal",     type: image,  required: true }
      - { name: foto_alt,       label: "Descripción de la foto",   type: string, required: true }
      - { name: email,          label: "Email de contacto",        type: string }
      - { name: red_instagram,  label: "Instagram (URL completa)", type: string }
      - { name: red_tiktok,     label: "TikTok (URL completa)",    type: string }
      - { name: libro_titulo,   label: "Título del libro",         type: string }
      - { name: libro_descripcion, label: "Descripción del libro", type: text }
      - { name: libro_enlace,   label: "Enlace de compra del libro", type: string }
      - { name: libro_imagen,   label: "Portada del libro",        type: image }
      - { name: bib_nombre,     label: "Nombre de la biblioteca",  type: string }
      - { name: bib_descripcion, label: "Descripción de la biblioteca", type: text }
      - { name: bib_imagen,     label: "Foto de la biblioteca",    type: image }

  - name: actividades
    label: "📅 Actividades y novedades"
    type: collection
    path: src/content/actividades
    view:
      fields: [titulo, categoria, fecha, activo]
    fields:
      - { name: titulo,      label: "Título",                           type: string,  required: true }
      - { name: fecha,       label: "Fecha",                            type: date,    required: true }
      - { name: imagen,      label: "Imagen",                           type: image }
      - { name: imagen_alt,  label: "Descripción de la imagen",         type: string }
      - { name: extracto,    label: "Resumen corto",                    type: text,    required: true }
      - { name: categoria,   label: "Categoría (Club de lectura, Evento literario, Ludoteca...)", type: string }
      - { name: destacado,   label: "¿Actividad destacada?",            type: boolean }
      - { name: activo,      label: "¿Mostrar en la web?",              type: boolean }
      - { name: orden,       label: "Orden de aparición",               type: number }
      - name: body
        label: "Contenido completo de la actividad"
        type: rich-text

  - name: paginas
    label: "📄 Páginas legales"
    type: collection
    path: src/content/paginas
    view:
      fields: [titulo, publicada]
    fields:
      - { name: titulo,      label: "Título",      type: string,  required: true }
      - { name: descripcion, label: "Descripción", type: string }
      - { name: publicada,   label: "¿Publicada?", type: boolean }
      - name: body
        label: "Contenido"
        type: rich-text
        required: true


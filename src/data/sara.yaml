nombre: "Sara Benrahou Clos"
nombre_corto: "Sara"
subtitulo: "Escritora y bibliotecaria"
residencia: "Muel, Zaragoza"

bio_corta: >
  Escritora y encargada de la Biblioteca-Ludoteca de Muel. Creo espacios donde
  los libros y las personas se encuentran, dentro y fuera de las páginas.

bio_completa: >
  Soy Sara, y los libros han sido siempre mi forma de entender el mundo.

  Como encargada de la Biblioteca-Ludoteca de Muel llevo años trabajando para
  que la lectura sea algo vivo: organizando actividades, invitando a autoras,
  creando un espacio donde los niños descubran que leer puede ser la mejor
  aventura posible.

  Paralelamente, escribo. Formo parte de La geografía de la memoria, una obra
  colaborativa de ocho escritoras publicada con Diversidad Literaria a través
  de crowdfunding. Un proyecto colectivo sobre la memoria, los lugares y las
  mujeres que los habitan.

  Me encontrarás en Instagram y TikTok como @cucutecariadelujo, donde comparto
  lecturas, recomendaciones y un poco del día a día entre estantes.


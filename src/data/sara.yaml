libro:
  titulo: "La geografía de la memoria"
  descripcion: >
    Una obra colaborativa de ocho escritoras nacida de un proyecto de crowdfunding.
    Ocho voces femeninas que exploran la memoria, los lugares que nos forman y las
    historias que guardamos en ellos. Sara participa como una de las autoras de
    esta antología publicada con Diversidad Literaria.
  enlace: "https://www.diversidadliteraria.com/la-geografia-de-la-memoria"
  boton: "Ver en Diversidad Literaria"
